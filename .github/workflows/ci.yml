name: CI

# Run on every PR open/reopen and on every push to an open PR.
# Using only `pull_request` avoids the double-run you get when both
# `push` and `pull_request` are listed — GitHub fires `pull_request`
# on synchronize (new push to a PR branch) automatically.
on:
  pull_request:
    branches: [main]

# Cancel any in-progress run for the same PR when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lua checks
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Check formatting (StyLua)
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check plugin/

      - name: Install luacheck
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y luarocks
          sudo luarocks install luacheck

      - name: Run luacheck
        run: luacheck plugin/

      - name: Install lua-language-server
        run: |
          LLS_VERSION="3.11.1"
          curl -fsSL "https://github.com/LuaLS/lua-language-server/releases/download/${LLS_VERSION}/lua-language-server-${LLS_VERSION}-linux-x64.tar.gz" \
            | sudo tar -xz -C /usr/local

      - name: Run lua-language-server
        run: |
          lua-language-server --check plugin/ --logpath /tmp/lua-ls-log
          if grep -q '"severity":1' /tmp/lua-ls-log/check.json 2>/dev/null; then
            cat /tmp/lua-ls-log/check.json
            exit 1
          fi

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      # The plugin targets the Wezterm-embedded Lua 5.4 interpreter; the specs use
      # 5.4 syntax (e.g. the `//` integer-division operator), so pin 5.4 here too.
      - name: Set up Lua 5.4
        uses: leafo/gh-actions-lua@v10
        with:
          luaVersion: "5.4"

      - name: Set up LuaRocks
        uses: leafo/gh-actions-luarocks@v4

      - name: Install busted
        run: luarocks install busted

      - name: Run unit tests
        run: busted

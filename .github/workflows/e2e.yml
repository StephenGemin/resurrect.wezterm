name: E2E smoke

# Confirm the plugin loads and starts without error on all supported platforms.
# This runs on push to main (and PRs during initial rollout — see note below).
# Revert the pull_request trigger before merging the final version of this file.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # All platforms use this version. Update when a new WezTerm stable ships.
  WEZTERM_VERSION: "20240203-110809-5046fc22"

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install Xvfb (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y xvfb

      - name: Start virtual display (Linux)
        if: runner.os == 'Linux'
        run: Xvfb :99 -screen 0 1280x800x24 &

      - name: Install WezTerm (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -fsSL \
            "https://github.com/wez/wezterm/releases/download/${WEZTERM_VERSION}/wezterm-${WEZTERM_VERSION}.Ubuntu22.04.deb" \
            -o wezterm.deb
          sudo apt-get install -y ./wezterm.deb

      - name: Install WezTerm (macOS)
        if: runner.os == 'macOS'
        run: |
          curl -fsSL \
            "https://github.com/wez/wezterm/releases/download/${WEZTERM_VERSION}/WezTerm-macos-${WEZTERM_VERSION}.zip" \
            -o wezterm-macos.zip
          unzip -q wezterm-macos.zip
          echo "$(pwd)/WezTerm.app/Contents/MacOS" >> "$GITHUB_PATH"

      - name: Install WezTerm (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ver = $env:WEZTERM_VERSION
          Invoke-WebRequest `
            "https://github.com/wez/wezterm/releases/download/$ver/WezTerm-windows-$ver.zip" `
            -OutFile wezterm-windows.zip
          Expand-Archive wezterm-windows.zip -DestinationPath wezterm-windows
          $dir = (Get-ChildItem -Recurse -Filter wezterm.exe wezterm-windows | Select-Object -First 1).DirectoryName
          $dir | Out-File -Append $env:GITHUB_PATH

      - name: Run smoke test
        shell: bash
        run: |
          [ "$RUNNER_OS" = "Linux" ] && export DISPLAY=:99
          bash spec/e2e/smoke.sh
